        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "id"
            type: "UUID"
            nullable: false
            description: "Unique queue entry identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "signal_set_hash"
            type: "TEXT"
            nullable: false
            description: "References lcs.signal_registry by value for signal configuration"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "signal_category"
