  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Errors
  # CANONICAL: cl_errors | ERROR: cl_errors_archive
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-ERRORS"
    name: "Errors"
    tables:

      - schema: "cl"
        name: "cl_errors"
        description: "Unified error logging for all CL validation passes with retry and TTL support"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Unique error identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL for pre-mint errors"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lifecycle_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the lifecycle processing run that produced this error"
            semantic_role: "attribute"
            format: "STRING"
          - name: "pass_name"
            type: "TEXT"
            nullable: false
            description: "Validation pass category: existence, name, domain, collision, firmographic"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "failure_reason_code"
            type: "TEXT"
            nullable: false
            description: "Standardized failure reason code (e.g. EXISTENCE_FAIL, NAME_FAIL)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "inputs_snapshot"
            type: "JSONB"
            nullable: true
            description: "Complete snapshot of inputs at time of failure for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when error was logged, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when error was resolved, NULL if unresolved"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "retry_count"
            type: "INTEGER"
            nullable: true
            description: "Number of retry attempts made, default 0"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "retry_ceiling"
            type: "INTEGER"
            nullable: true
            description: "Maximum retries before marking permanent, default 3"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "retry_after"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Earliest time to retry this error"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "tool_used"
            type: "TEXT"
            nullable: true
            description: "Tool that resolved or attempted resolution (e.g. MXLookup, Firecrawl)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "tool_tier"
            type: "INTEGER"
            nullable: true
            description: "Toolbox tier: 0=free, 1=cheap, 2=surgical"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "expires_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "TTL for transient errors, auto-resolve after this timestamp"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "cl"
        name: "cl_errors_archive"
        description: "Archived errors preserving forensic history without cluttering active error table"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Unique error identifier copied from cl_errors"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL for pre-mint errors"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lifecycle_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the lifecycle processing run that produced this error"
            semantic_role: "attribute"
            format: "STRING"
          - name: "pass_name"
            type: "TEXT"
            nullable: false
            description: "Validation pass category: existence, name, domain, collision, firmographic"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "failure_reason_code"
            type: "TEXT"
            nullable: false
            description: "Standardized failure reason code (e.g. EXISTENCE_FAIL, NAME_FAIL)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "inputs_snapshot"
            type: "JSONB"
            nullable: true
            description: "Complete snapshot of inputs at time of failure for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Original timestamp when error was logged"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when error was resolved"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "retry_count"
            type: "INTEGER"
            nullable: true
            description: "Number of retry attempts made before archival"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "retry_ceiling"
            type: "INTEGER"
            nullable: true
            description: "Maximum retries before marking permanent"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "retry_after"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Earliest time to retry this error"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "tool_used"
            type: "TEXT"
            nullable: true
            description: "Tool that resolved or attempted resolution"
            semantic_role: "attribute"
            format: "STRING"
          - name: "tool_tier"
            type: "INTEGER"
            nullable: true
            description: "Toolbox tier: 0=free, 1=cheap, 2=surgical"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "expires_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "TTL for transient errors"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "archived_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when error was archived, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "archive_reason"
            type: "TEXT"
            nullable: true
            description: "Reason for archiving: RESOLVED, TTL_EXPIRED, MANUAL"
            semantic_role: "attribute"
            format: "ENUM"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Gate
  # CANONICAL: identity_gate_audit | ERROR: identity_gate_failures
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-GATE"
    name: "Gate"
    tables:

      - schema: "cl"
        name: "identity_gate_audit"
        description: "Audit log for identity gate checks per downstream run with eligibility statistics"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "audit_id"
            type: "UUID"
            nullable: false
            description: "Unique audit record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the lifecycle or downstream run being audited"
            semantic_role: "attribute"
            format: "STRING"
          - name: "stage"
            type: "TEXT"
            nullable: false
            description: "Stage name: OUTREACH_ENTRY, COMPANY_TARGET, or other downstream stage"
            semantic_role: "attribute"
            format: "STRING"
          - name: "total_scanned"
            type: "INTEGER"
            nullable: false
            description: "Total companies scanned in this run"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "eligible_count"
            type: "INTEGER"
            nullable: false
            description: "Count of companies that passed the identity gate"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "blocked_count"
            type: "INTEGER"
            nullable: false
            description: "Count of companies that failed the identity gate"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "sample_blocked_ids"
            type: "TEXT"
            nullable: true
            description: "Sample of blocked company IDs as array, default empty"
            semantic_role: "attribute"
            format: "JSON"
          - name: "blocked_reasons"
            type: "JSONB"
            nullable: true
            description: "Reason distribution as JSON (e.g. PENDING: 100, FAIL_DOMAIN: 50)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "gate_enforced"
            type: "BOOLEAN"
            nullable: false
            description: "Whether gate enforcement was active for this run, default TRUE"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when audit record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "cl"
        name: "identity_gate_failures"
        description: "Records that reached downstream but failed the identity gate eligibility check"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "failure_id"
            type: "UUID"
            nullable: false
            description: "Unique failure record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity for the company that failed the gate"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "run_id"
            type: "TEXT"
            nullable: false
            description: "Downstream run identifier where gate failure occurred"
            semantic_role: "attribute"
            format: "STRING"
          - name: "stage"
            type: "TEXT"
            nullable: false
            description: "Stage name where failure occurred in downstream pipeline"
            semantic_role: "attribute"
            format: "STRING"
          - name: "error_code"
            type: "TEXT"
            nullable: false
            description: "Error code: CT_UPSTREAM_IDENTITY_NOT_APPROVED"
            semantic_role: "attribute"
            format: "STRING"
          - name: "eligibility_reason"
            type: "TEXT"
            nullable: true
            description: "Reason for ineligibility: PASS, PENDING, FAIL_STATE, FAIL_NAME, FAIL_DOMAIN, UNKNOWN"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "identity_pass"
            type: "INTEGER"
            nullable: true
            description: "Value of identity_pass column at time of gate failure"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "identity_status"
            type: "TEXT"
            nullable: true
            description: "Value of identity_status at time of gate failure"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "existence_verified"
            type: "BOOLEAN"
            nullable: true
            description: "Value of existence_verified at time of gate failure"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when failure was logged, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: LCS Events
  # CANONICAL: lcs.event (CET) | ERROR: lcs.err0
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-LCS-EVENTS"
    name: "LCS Events"
    tables:

      - schema: "lcs"
        name: "event"
        description: "Canonical Event Table — append-only ledger of all communication events, partitioned monthly"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "COMPOSITE"
        columns:
          - name: "communication_id"
            type: "TEXT"
            nullable: false
            description: "Message artifact ID (ULID), format: LCS-{PHASE}-{YYYYMMDD}-{ULID}, immutable"
            semantic_role: "identifier"
            format: "STRING"
          - name: "message_run_id"
            type: "TEXT"
            nullable: false
            description: "Delivery attempt ID, format: RUN-LCS-{PHASE}-{YYYYMMDD}-{ULID}-{CHANNEL}-{ATTEMPT}"
            semantic_role: "identifier"
            format: "STRING"
          - name: "sovereign_company_id"
            type: "UUID"
            nullable: false
            description: "Reference to cl.company_identity by value (not FK due to partitioning)"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "entity_type"
            type: "TEXT"
            nullable: false
            description: "Entity target type: slot or person"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "entity_id"
            type: "UUID"
            nullable: false
            description: "Upstream entity resolution identifier"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "signal_set_hash"
            type: "TEXT"
            nullable: false
            description: "References lcs.signal_registry by value for signal traceability"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "frame_id"
            type: "TEXT"
            nullable: false
            description: "References lcs.frame_registry by value for message frame"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "adapter_type"
            type: "TEXT"
            nullable: false
            description: "References lcs.adapter_registry by value for delivery adapter"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "channel"
            type: "TEXT"
            nullable: false
            description: "Delivery channel code: MG (Mailgun), HR (HeyReach), SH (Sales Handoff)"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "delivery_status"
            type: "TEXT"
            nullable: false
            description: "Delivery outcome: PENDING, SENT, DELIVERED, OPENED, CLICKED, REPLIED, BOUNCED, FAILED"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "lifecycle_phase"
            type: "TEXT"
            nullable: false
            description: "Lifecycle phase: OUTREACH, SALES, or CLIENT"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "event_type"
            type: "TEXT"
            nullable: false
            description: "Pipeline event type (20 canonical types including SIGNAL_RECEIVED, DELIVERY_SENT, etc.)"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "lane"
            type: "TEXT"
            nullable: false
            description: "Communication lane: MAIN, LANE_A, LANE_B, or NEWSLETTER"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "agent_number"
            type: "TEXT"
            nullable: false
            description: "Territory agent identifier for routing and attribution"
            semantic_role: "attribute"
            format: "STRING"
          - name: "step_number"
            type: "INTEGER"
            nullable: false
            description: "Pipeline step number: 0=gate block, 1-7=pipeline, 8=webhook, 9=reserved"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "step_name"
            type: "TEXT"
            nullable: false
            description: "Human-readable step name in the pipeline sequence"
            semantic_role: "attribute"
            format: "STRING"
          - name: "payload"
            type: "JSONB"
            nullable: true
            description: "Compiled message payload (send steps only)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "adapter_response"
            type: "JSONB"
            nullable: true
            description: "Raw adapter response from delivery service (post-adapter call only)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "intelligence_tier"
            type: "INTEGER"
            nullable: true
            description: "Intelligence tier 1-5 from company intelligence snapshot at composition time"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "sender_identity"
            type: "TEXT"
            nullable: true
            description: "Sender persona used for this communication"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when event was created, immutable, part of composite PK"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "lcs"
        name: "err0"
        description: "Append-only LCS failure log with ORBT 3-strike protocol for delivery errors"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Unique error identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "message_run_id"
            type: "TEXT"
            nullable: false
            description: "Delivery attempt that encountered failure (by value, not FK)"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "communication_id"
            type: "TEXT"
            nullable: true
            description: "Communication attempt that failed, NULL if pre-CET failure"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "sovereign_company_id"
            type: "TEXT"
            nullable: true
            description: "Company reference by value (not FK), nullable for system errors"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "failure_type"
            type: "TEXT"
            nullable: false
            description: "Error classification: ADAPTER_ERROR, TIMEOUT, VALIDATION_ERROR, RATE_LIMIT, BOUNCE_HARD, etc."
            semantic_role: "attribute"
            format: "ENUM"
          - name: "failure_message"
            type: "TEXT"
            nullable: false
            description: "Human-readable failure message describing the error"
            semantic_role: "attribute"
            format: "STRING"
          - name: "lifecycle_phase"
            type: "TEXT"
            nullable: true
            description: "Lifecycle phase: OUTREACH, SALES, CLIENT, or NULL"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "adapter_type"
            type: "TEXT"
            nullable: true
            description: "Which adapter failed, if applicable"
            semantic_role: "attribute"
            format: "STRING"
          - name: "orbt_strike_number"
            type: "INTEGER"
            nullable: true
            description: "ORBT strike: 1, 2, or 3, nullable for non-ORBT errors"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "orbt_action_taken"
            type: "TEXT"
            nullable: true
            description: "Action taken: AUTO_RETRY, ALT_CHANNEL, or HUMAN_ESCALATION"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "orbt_alt_channel_eligible"
            type: "BOOLEAN"
            nullable: true
            description: "Whether alternate channel delivery was checked"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "orbt_alt_channel_reason"
            type: "TEXT"
            nullable: true
            description: "Reason why alternate channel passed or failed eligibility"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when error was logged, immutable, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: LCS Signals
  # CANONICAL: signal_queue | ERROR: lcs.err0 (shared)
