  # ═════════════════════════════════════════════════════════════════════════════
  # LCS — LIFECYCLE COMMUNICATION SYSTEM (04.01.04)
  # Womb-to-tomb message ledger — every send ever, all stages
  # CANONICAL: message_ledger (MID) — one record per send attempt
  # ERROR: message_error — fail-closed logging for invalid CID-to-MID or output failures
  # SUPPORTING: sender_profile_registry — from/reply-to/provider configs
  # CID tables remain stage-owned (outreach, sales, client)
  # ═════════════════════════════════════════════════════════════════════════════

  # ─────────────────────────────────────────────────────────────────────────────
  # LCS (04.01.04) — Message ledger
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "04.01.04"
    name: "lcs"
    tables:

      - schema: "lcs"
        name: "message_ledger"
        description: "CTB CANONICAL — womb-to-tomb message ledger, one record per send attempt (MID), source of truth for everything ever sent across all stages"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "mid"
            type: "UUID"
            nullable: false
            description: "Primary key, message instance ID — one per send attempt"
            semantic_role: "identifier"
            format: "UUID"
          - name: "sovereign_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity(company_unique_id)"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lcs_id"
            type: "UUID"
            nullable: false
            description: "LCS identity, resolves 1:1 from sovereign_id, permanent per company"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "source_stage"
            type: "TEXT"
            nullable: false
            description: "Stage that originated this send: OUTREACH, SALES, or CLIENT"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "source_cid_table"
            type: "TEXT"
            nullable: false
            description: "Fully qualified source CID table name (e.g. outreach.cid_table)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "cid"
            type: "TEXT"
            nullable: false
            description: "Movement intent identifier from source CID table, logical FK"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "channel"
            type: "TEXT"
            nullable: false
            description: "Communication channel: EMAIL or LINKEDIN"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "provider"
            type: "TEXT"
            nullable: false
            description: "Transport provider: MAILGUN, HEYREACH, or SMTP"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "sender_profile_id"
            type: "UUID"
            nullable: false
            description: "FK to lcs.sender_profile_registry, determines from/reply-to/provider config"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "payload_hash"
            type: "TEXT"
            nullable: false
            description: "Hash of message payload for deduplication and audit"
            semantic_role: "attribute"
            format: "STRING"
          - name: "status"
            type: "TEXT"
            nullable: false
            description: "Send status FSM: READY, SENT, FAIL, SUPPRESSED, or RETRY"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "provider_message_id"
            type: "TEXT"
            nullable: true
            description: "External message ID returned by transport provider for tracking"
            semantic_role: "attribute"
            format: "STRING"
          - name: "attempt_number"
            type: "INTEGER"
            nullable: false
            description: "Send attempt number, starts at 1, incremented on retry"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "ready_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when MID entered READY state"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "sent_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when transport confirmed send"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "last_error_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp of most recent error on this MID"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Row creation timestamp, auto-set, immutable"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Last update timestamp, auto-set on status change"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "lcs"
        name: "message_error"
        description: "CTB ERROR — fail-closed logging for invalid CID-to-MID creation or output failures that cannot be recorded on MID"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Primary key, auto-generated"
            semantic_role: "identifier"
            format: "UUID"
          - name: "sovereign_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity(company_unique_id)"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lcs_id"
            type: "UUID"
            nullable: true
            description: "FK to lcs record, nullable if lookup fails before resolution"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "source_stage"
            type: "TEXT"
            nullable: false
            description: "Stage that originated the failed operation: OUTREACH, SALES, or CLIENT"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "cid"
            type: "TEXT"
            nullable: true
            description: "CID from source table, nullable if error occurs before CID resolution"
            semantic_role: "foreign_key"
            format: "STRING"
          - name: "error_code"
            type: "TEXT"
            nullable: false
            description: "Standardized error code: INVALID_CID, LCS_NOT_FOUND, SUPPRESSED, PROVIDER_REJECT, VALIDATION_FAIL"
            semantic_role: "attribute"
            format: "STRING"
          - name: "payload"
            type: "JSONB"
            nullable: true
            description: "Structured error detail payload for debugging and audit"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Error creation timestamp, auto-set, immutable"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "lcs"
        name: "sender_profile_registry"
        description: "SUPPORTING — sender identity configs per stage/persona/channel, defines from/reply-to/provider settings for transport adapters"
        leaf_type: "STAGING"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "sender_profile_id"
            type: "UUID"
            nullable: false
            description: "Primary key, unique sender profile identifier"
            semantic_role: "identifier"
            format: "UUID"
          - name: "stage"
            type: "TEXT"
            nullable: false
            description: "Stage this profile applies to: OUTREACH, SALES, or CLIENT"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "channel"
            type: "TEXT"
            nullable: false
            description: "Communication channel: EMAIL or LINKEDIN"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "provider"
            type: "TEXT"
            nullable: false
            description: "Transport provider: MAILGUN, HEYREACH, or SMTP"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "from_address"
            type: "TEXT"
            nullable: true
            description: "Sender email address or LinkedIn profile identifier"
            semantic_role: "attribute"
            format: "STRING"
          - name: "reply_to_address"
            type: "TEXT"
            nullable: true
            description: "Reply-to email address, nullable for LinkedIn channel"
            semantic_role: "attribute"
            format: "STRING"
          - name: "display_name"
            type: "TEXT"
            nullable: true
            description: "Human-readable sender display name"
            semantic_role: "attribute"
            format: "STRING"
          - name: "is_active"
            type: "BOOLEAN"
            nullable: false
            description: "Whether this sender profile is active, default TRUE"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Profile creation timestamp, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Last update timestamp, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
