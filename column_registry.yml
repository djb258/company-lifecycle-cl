# ═══════════════════════════════════════════════════════════════════════════════
# COLUMN REGISTRY — Canonical Schema Spine
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Inherited)
# Status: REQUIRED — Every hub with data/ branch MUST have a column_registry.yml
# Version: 1.0.0
# Purpose: Single source of truth for all table schemas in this hub
# ═══════════════════════════════════════════════════════════════════════════════
#
# RULES:
#   1. This file is the CANONICAL entry point for all data schema
#   2. Generated files (TypeScript types, Zod schemas) are PROJECTIONS of this file
#   3. Generated files are NEVER hand-edited
#   4. After updating this file, run: ./scripts/codegen-generate.sh
#   5. Pre-commit hook enforces sync between this file and generated output
#   6. Each table declares owning_subhub per ARCHITECTURE.md OWN-10
#   7. Each sub-hub has exactly 1 CANONICAL + 1 ERROR table (OWN-10a, OWN-10b)
#   8. Additional table types require ADR justification (OWN-10c)
#
# READING ORDER:
#   OSAM → column_registry.yml → generated files
#
# ═══════════════════════════════════════════════════════════════════════════════

version: "1.0.0"
last_updated: "2026-02-16"

# ═══════════════════════════════════════════════════════════════════════════════
# HUB IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

hub:
  hub_id: "HUB-CL-001"
  hub_name: "Company Lifecycle"
  universal_join_key: "company_unique_id"
  universal_join_key_type: "UUID"

# ═══════════════════════════════════════════════════════════════════════════════
# SPINE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

spine_table:
  schema: "cl"
  name: "company_identity"
  description: "Sovereign identity registry — canonical source of truth for company identity minting and lifecycle tracking"
  owning_subhub: null
  leaf_type: "CANONICAL"
  source_of_truth: true
  row_identity_strategy: "UUID"
  columns:
    - name: "company_unique_id"
      type: "UUID"
      nullable: false
      description: "Sovereign, immutable, globally unique identifier for the company"
      semantic_role: "identifier"
      format: "UUID"
    - name: "company_name"
      type: "TEXT"
      nullable: false
      description: "Canonical human-readable company name, may be corrected if originally incorrect"
      semantic_role: "attribute"
      format: "STRING"
    - name: "company_domain"
      type: "TEXT"
      nullable: true
      description: "Primary web domain (no protocol, lowercase), identity anchor for the company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "linkedin_company_url"
      type: "TEXT"
      nullable: true
      description: "LinkedIn company page URL, identity anchor alongside domain"
      semantic_role: "attribute"
      format: "STRING"
    - name: "source_system"
      type: "TEXT"
      nullable: false
      description: "Origin system that created this identity, immutable after mint"
      semantic_role: "attribute"
      format: "STRING"
    - name: "created_at"
      type: "TIMESTAMPTZ"
      nullable: false
      description: "Timestamp when identity was minted, immutable, always UTC"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "canonical_name"
      type: "TEXT"
      nullable: true
      description: "Alternative canonical name variant for the company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "state_verified"
      type: "TEXT"
      nullable: true
      description: "State verification status from identity gate checks"
      semantic_role: "attribute"
      format: "STRING"
    - name: "employee_count_band"
      type: "TEXT"
      nullable: true
      description: "Employee count band classification (e.g. 1-10, 11-50, 51-200)"
      semantic_role: "attribute"
      format: "STRING"
    - name: "company_fingerprint"
      type: "TEXT"
      nullable: true
      description: "Deterministic fingerprint of company attributes for collision detection"
      semantic_role: "attribute"
      format: "STRING"
    - name: "lifecycle_run_id"
      type: "TEXT"
      nullable: true
      description: "Identifier for the lifecycle processing run that validated this company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "identity_pass"
      type: "INTEGER"
      nullable: true
      description: "Pass flag (0 or 1+), default 0, incremented on successful identity gate pass"
      semantic_role: "metric"
      format: "INTEGER"
    - name: "identity_status"
      type: "TEXT"
      nullable: true
      description: "Identity gate status: PENDING, PASS, or FAIL — determines downstream eligibility"
      semantic_role: "attribute"
      format: "ENUM"
    - name: "last_pass_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp of last successful pass through the identity gate"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "existence_verified"
      type: "BOOLEAN"
      nullable: true
      description: "Domain existence verification result, informational only"
      semantic_role: "attribute"
      format: "BOOLEAN"
    - name: "name_match_score"
      type: "INTEGER"
      nullable: true
      description: "Name matching confidence score from 0 to 100"
      semantic_role: "metric"
      format: "INTEGER"
    - name: "state_match_result"
      type: "TEXT"
      nullable: true
      description: "State matching result: PASS, FAIL, or HARD_FAIL"
      semantic_role: "attribute"
      format: "ENUM"
    - name: "state_code"
      type: "CHAR"
      nullable: true
      description: "US state code (2 chars, uppercase), constrained to ^[A-Z]{2}$ or NULL"
      semantic_role: "attribute"
      format: "STRING"
    - name: "outreach_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to outreach record, set when Outreach claims this company"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "sales_process_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to sales process, set when Sales opens opportunity"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "client_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to client record, set when company becomes client"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "outreach_attached_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when outreach_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "sales_opened_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when sales_process_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "client_promoted_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when client_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"

# ═══════════════════════════════════════════════════════════════════════════════
# SUB-HUB TABLES
# ═══════════════════════════════════════════════════════════════════════════════
# Each sub-hub declares exactly:
#   - 1 CANONICAL table (OWN-10a)
#   - 1 ERROR table (OWN-10b) — or references shared error table
#   - Additional types require ADR (OWN-10c)
# ═══════════════════════════════════════════════════════════════════════════════

subhubs:

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Intake
  # Error routing: cl.cl_errors (shared)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-INTAKE"
    name: "Intake"
    tables:

      - schema: "cl"
        name: "company_candidate"
        description: "Canonical intake staging table for company candidates before identity minting"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "candidate_id"
            type: "UUID"
            nullable: false
            description: "Unique candidate identifier, auto-generated, NOT company_unique_id"
            semantic_role: "identifier"
            format: "UUID"
          - name: "source_system"
            type: "TEXT"
            nullable: false
            description: "Origin system that submitted this candidate (e.g. nc_sos_excel, tx_api)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "source_record_id"
            type: "TEXT"
            nullable: false
            description: "Unique identifier within the source system (e.g. NC SOS file number)"
            semantic_role: "identifier"
            format: "STRING"
          - name: "state_code"
            type: "CHAR"
            nullable: false
            description: "US state code (2 chars, uppercase), constrained to ^[A-Z]{2}$"
            semantic_role: "attribute"
            format: "STRING"
          - name: "raw_payload"
            type: "JSONB"
            nullable: false
            description: "Complete raw data from source as JSONB, preserved for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "ingestion_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the ingestion batch/run, used for tracking and rollback"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when candidate was ingested, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "verification_status"
            type: "TEXT"
            nullable: false
            description: "Status: PENDING, VERIFIED, or FAILED — only VERIFIED can promote to identity"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "verification_error"
            type: "TEXT"
            nullable: true
            description: "If FAILED, contains the error message or code from verification"
            semantic_role: "attribute"
            format: "STRING"
          - name: "verified_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when verification completed (if VERIFIED or FAILED)"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL until candidate is verified and promoted"
            semantic_role: "foreign_key"
            format: "UUID"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Bridge
  # Error routing: cl.cl_errors (shared)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-BRIDGE"
    name: "Bridge"
    tables:

      - schema: "cl"
        name: "company_identity_bridge"
        description: "Join surface mapping source system records to sovereign company identities"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "bridge_id"
            type: "UUID"
            nullable: false
            description: "Unique bridge record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_sov_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity sovereign ID, unique per bridge record"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "source_company_id"
            type: "UUID"
            nullable: false
            description: "Unique identifier of the company in the source system"
            semantic_role: "identifier"
            format: "UUID"
          - name: "source_system"
            type: "TEXT"
            nullable: false
            description: "Origin system providing this bridge mapping (e.g. nc_sos, de_csv)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "match_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Confidence score (0-100) for the bridge match quality"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "match_method"
            type: "TEXT"
            nullable: true
            description: "Method used to establish the bridge match (e.g. exact, fuzzy, manual)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "match_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting the bridge match decision"
            semantic_role: "attribute"
            format: "JSON"
          - name: "bridge_status"
            type: "TEXT"
            nullable: true
            description: "Status of the bridge record: active, inactive, superseded"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge record was last updated, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "created_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who created this bridge record"
            semantic_role: "attribute"
            format: "STRING"
          - name: "validated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge was validated by human or automated check"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "validated_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who validated this bridge record"
            semantic_role: "attribute"
            format: "STRING"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Names
  # Error routing: cl.cl_errors (shared)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-NAMES"
    name: "Names"
    tables:

      - schema: "cl"
        name: "company_names"
        description: "Name variants and aliases for companies, sidecar to spine identity table"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "name_id"
            type: "UUID"
            nullable: false
            description: "Unique name record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity spine table, links name to company"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "name_value"
            type: "TEXT"
            nullable: false
            description: "The actual company name string (variant, alias, or legal name)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "name_type"
            type: "TEXT"
            nullable: false
            description: "Type classification: legal, trade, dba, alias, abbreviation"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "is_primary"
            type: "BOOLEAN"
            nullable: true
            description: "Whether this is the primary name for the company, default false"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "language"
            type: "TEXT"
            nullable: true
            description: "ISO language code for this name variant, default en"
            semantic_role: "attribute"
            format: "STRING"
          - name: "verified"
            type: "BOOLEAN"
            nullable: true
            description: "Whether this name variant has been verified, default false"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "verification_date"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when name verification was completed"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "verification_source"
            type: "TEXT"
            nullable: true
            description: "Source or method of name verification (e.g. SOS filing, manual)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when name record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when name record was last updated, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "created_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who created this name record"
            semantic_role: "attribute"
            format: "STRING"
          - name: "metadata"
            type: "JSONB"
            nullable: true
            description: "Additional metadata for the name record as JSON"
            semantic_role: "attribute"
            format: "JSON"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Domains
  # Error routing: cl.cl_errors (shared)
  # ADR-justified additional table: domain_hierarchy
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-DOMAINS"
    name: "Domains"
    tables:

      - schema: "cl"
        name: "company_domains"
        description: "Domain records and DNS metadata for companies, sidecar to spine identity table"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "domain_id"
            type: "UUID"
            nullable: false
            description: "Unique domain record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity spine table, links domain to company"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "domain"
            type: "TEXT"
            nullable: false
            description: "Domain name string (no protocol, lowercase), e.g. example.com"
            semantic_role: "attribute"
            format: "STRING"
          - name: "domain_type"
            type: "TEXT"
            nullable: true
            description: "Type classification: primary, secondary, redirect, parked"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "is_primary"
            type: "BOOLEAN"
            nullable: true
            description: "Whether this is the primary domain for the company, default false"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "verified"
            type: "BOOLEAN"
            nullable: true
            description: "Whether domain ownership/existence has been verified, default false"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "verification_date"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when domain verification was completed"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "verification_method"
            type: "TEXT"
            nullable: true
            description: "Method of verification: DNS lookup, MX check, HTTP probe"
            semantic_role: "attribute"
            format: "STRING"
          - name: "domain_status"
            type: "TEXT"
            nullable: true
            description: "Current domain status: active, expired, parked, redirect"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "status_check_date"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp of last domain status check"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "redirect_to_domain"
            type: "TEXT"
            nullable: true
            description: "Target domain if this domain redirects to another"
            semantic_role: "attribute"
            format: "STRING"
          - name: "nameservers"
            type: "TEXT"
            nullable: true
            description: "DNS nameservers array for this domain"
            semantic_role: "attribute"
            format: "JSON"
          - name: "mx_records"
            type: "TEXT"
            nullable: true
            description: "MX records array for this domain's email routing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "txt_records"
            type: "TEXT"
            nullable: true
            description: "TXT records array for this domain (SPF, DKIM, etc.)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "dns_analysis"
            type: "JSONB"
            nullable: true
            description: "Full DNS analysis payload as JSON (provider, CDN, etc.)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "ssl_certificate_valid"
            type: "BOOLEAN"
            nullable: true
            description: "Whether the domain has a valid SSL/TLS certificate"
            semantic_role: "attribute"
            format: "BOOLEAN"
          - name: "ssl_issuer"
            type: "TEXT"
            nullable: true
            description: "Certificate issuer name (e.g. Let's Encrypt, DigiCert)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "ssl_expiry_date"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "SSL certificate expiration date"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "whois_data"
            type: "JSONB"
            nullable: true
            description: "WHOIS registration data as JSON (registrar, dates, contacts)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "security_flags"
            type: "JSONB"
            nullable: true
            description: "Security analysis flags as JSON (blacklist, phishing, malware)"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when domain record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when domain record was last updated, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "created_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who created this domain record"
            semantic_role: "attribute"
            format: "STRING"
          - name: "metadata"
            type: "JSONB"
            nullable: true
            description: "Additional metadata for the domain record as JSON"
            semantic_role: "attribute"
            format: "JSON"

      # ADR-justified: domain_hierarchy (OWN-10c)
      - schema: "cl"
        name: "domain_hierarchy"
        description: "Domain sharing relationships between parent and child companies in hierarchies"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "hierarchy_id"
            type: "UUID"
            nullable: false
            description: "Unique hierarchy record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "domain"
            type: "TEXT"
            nullable: false
            description: "Shared domain that connects parent and child companies"
            semantic_role: "attribute"
            format: "STRING"
          - name: "parent_company_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity for the definitive parent entity"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "child_company_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity for subsidiary/branch/location entity"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "relationship_type"
            type: "TEXT"
            nullable: false
            description: "Hierarchy type: PARENT_ANCHOR, CHILD_OPERATING_UNIT, SIBLING_BRAND, AMBIGUOUS_UNRESOLVED"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Confidence score 0-100 for the hierarchy relationship determination"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "resolution_method"
            type: "TEXT"
            nullable: true
            description: "How the hierarchy was determined: CORPORATE_SIGNALS, OLDEST_RECORD, MANUAL"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when hierarchy relationship was recorded, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when ambiguity was resolved, if applicable"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who resolved the ambiguity"
            semantic_role: "attribute"
            format: "STRING"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUB-HUB: Confidence
  # Error routing: cl.cl_errors (shared)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "SH-CONFIDENCE"
    name: "Confidence"
    tables:

      - schema: "cl"
