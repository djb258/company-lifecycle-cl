# ═══════════════════════════════════════════════════════════════════════════════
# COLUMN REGISTRY — Canonical Schema Spine
# ═══════════════════════════════════════════════════════════════════════════════
# Authority: imo-creator (Inherited)
# Status: REQUIRED — Every hub with data/ branch MUST have a column_registry.yml
# Version: 2.0.0
# Purpose: Single source of truth for all table schemas in this hub
# ═══════════════════════════════════════════════════════════════════════════════
#
# RULES:
#   1. This file is the CANONICAL entry point for all data schema
#   2. Generated files (TypeScript types, Zod schemas) are PROJECTIONS of this file
#   3. Generated files are NEVER hand-edited
#   4. After updating this file, run: ./scripts/codegen-generate.sh
#   5. Pre-commit hook enforces sync between this file and generated output
#   6. Each table declares owning_subhub per ARCHITECTURE.md OWN-10
#   7. Each sub-hub has exactly 1 CANONICAL + 1 ERROR table (OWN-10a, OWN-10b)
#   8. Additional table types require ADR justification (OWN-10c)
#
# STRUCTURE:
#   CL Hub (04.01) — Sovereign identity
#     ├── CL Core sub-hubs (04.01.01–03) — identity pipeline
#     └── LCS sub-hub (04.01.04) — womb-to-tomb message ledger
#   All sub-hubs connect through sovereign_id (company_unique_id)
#   LCS has its own identity (lcs_id) on the CL spine, same pattern as outreach_id
#   LCS CANONICAL = message_ledger (MID), LCS ERROR = message_error
#
# READING ORDER:
#   OSAM → column_registry.yml → generated files
#
# ═══════════════════════════════════════════════════════════════════════════════

version: "2.0.0"
last_updated: "2026-02-26"

# ═══════════════════════════════════════════════════════════════════════════════
# HUB IDENTITY
# ═══════════════════════════════════════════════════════════════════════════════

hub:
  hub_id: "04.01"
  hub_name: "Company Lifecycle"
  universal_join_key: "company_unique_id"
  universal_join_key_type: "UUID"

# ═══════════════════════════════════════════════════════════════════════════════
# SPINE TABLE
# ═══════════════════════════════════════════════════════════════════════════════

spine_table:
  schema: "cl"
  name: "company_identity"
  description: "Sovereign identity registry — canonical source of truth for company identity minting and lifecycle tracking"
  owning_subhub: null
  leaf_type: "CANONICAL"
  source_of_truth: true
  row_identity_strategy: "UUID"
  columns:
    - name: "company_unique_id"
      type: "UUID"
      nullable: false
      description: "Sovereign, immutable, globally unique identifier for the company"
      semantic_role: "identifier"
      format: "UUID"
    - name: "company_name"
      type: "TEXT"
      nullable: false
      description: "Canonical human-readable company name, may be corrected if originally incorrect"
      semantic_role: "attribute"
      format: "STRING"
    - name: "company_domain"
      type: "TEXT"
      nullable: true
      description: "Primary web domain (no protocol, lowercase), identity anchor for the company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "linkedin_company_url"
      type: "TEXT"
      nullable: true
      description: "LinkedIn company page URL, identity anchor alongside domain"
      semantic_role: "attribute"
      format: "STRING"
    - name: "source_system"
      type: "TEXT"
      nullable: false
      description: "Origin system that created this identity, immutable after mint"
      semantic_role: "attribute"
      format: "STRING"
    - name: "created_at"
      type: "TIMESTAMPTZ"
      nullable: false
      description: "Timestamp when identity was minted, immutable, always UTC"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "canonical_name"
      type: "TEXT"
      nullable: true
      description: "Alternative canonical name variant for the company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "state_verified"
      type: "TEXT"
      nullable: true
      description: "State verification status from identity gate checks"
      semantic_role: "attribute"
      format: "STRING"
    - name: "employee_count_band"
      type: "TEXT"
      nullable: true
      description: "Employee count band classification (e.g. 1-10, 11-50, 51-200)"
      semantic_role: "attribute"
      format: "STRING"
    - name: "company_fingerprint"
      type: "TEXT"
      nullable: true
      description: "Deterministic fingerprint of company attributes for collision detection"
      semantic_role: "attribute"
      format: "STRING"
    - name: "lifecycle_run_id"
      type: "TEXT"
      nullable: true
      description: "Identifier for the lifecycle processing run that validated this company"
      semantic_role: "attribute"
      format: "STRING"
    - name: "identity_pass"
      type: "INTEGER"
      nullable: true
      description: "Pass flag (0 or 1+), default 0, incremented on successful identity gate pass"
      semantic_role: "metric"
      format: "INTEGER"
    - name: "identity_status"
      type: "TEXT"
      nullable: true
      description: "Identity gate status: PENDING, PASS, or FAIL — determines downstream eligibility"
      semantic_role: "attribute"
      format: "ENUM"
    - name: "last_pass_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp of last successful pass through the identity gate"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "existence_verified"
      type: "BOOLEAN"
      nullable: true
      description: "Domain existence verification result, informational only"
      semantic_role: "attribute"
      format: "BOOLEAN"
    - name: "name_match_score"
      type: "INTEGER"
      nullable: true
      description: "Name matching confidence score from 0 to 100"
      semantic_role: "metric"
      format: "INTEGER"
    - name: "state_match_result"
      type: "TEXT"
      nullable: true
      description: "State matching result: PASS, FAIL, or HARD_FAIL"
      semantic_role: "attribute"
      format: "ENUM"
    - name: "state_code"
      type: "CHAR"
      nullable: true
      description: "US state code (2 chars, uppercase), constrained to ^[A-Z]{2}$ or NULL"
      semantic_role: "attribute"
      format: "STRING"
    - name: "outreach_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to outreach record, set when Outreach claims this company"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "sales_process_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to sales process, set when Sales opens opportunity"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "client_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to client record, set when company becomes client"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "lcs_id"
      type: "UUID"
      nullable: true
      description: "Write-once pointer to LCS record, set when company enters lifecycle communication system"
      semantic_role: "foreign_key"
      format: "UUID"
    - name: "outreach_attached_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when outreach_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "sales_opened_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when sales_process_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "client_promoted_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when client_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"
    - name: "lcs_attached_at"
      type: "TIMESTAMPTZ"
      nullable: true
      description: "Timestamp when lcs_id was attached, auto-set on first write"
      semantic_role: "attribute"
      format: "ISO-8601"

# ═══════════════════════════════════════════════════════════════════════════════
# SUB-HUB TABLES
# ═══════════════════════════════════════════════════════════════════════════════
# CL Core (04.01.01–03): Identity pipeline — intake, enrichment, gate
# LCS (04.01.04): Womb-to-tomb message ledger — own identity (lcs_id)
# All sub-hubs connect through sovereign_id (company_unique_id)
# ═══════════════════════════════════════════════════════════════════════════════

subhubs:

  # ─────────────────────────────────────────────────────────────────────────────
  # CL INTAKE (04.01.01)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "04.01.01"
    name: "intake"
    tables:

      - schema: "cl"
        name: "company_candidate"
        description: "Canonical intake staging table for company candidates before identity minting"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "candidate_id"
            type: "UUID"
            nullable: false
            description: "Unique candidate identifier, auto-generated, NOT company_unique_id"
            semantic_role: "identifier"
            format: "UUID"
          - name: "source_system"
            type: "TEXT"
            nullable: false
            description: "Origin system that submitted this candidate (e.g. nc_sos_excel, tx_api)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "source_record_id"
            type: "TEXT"
            nullable: false
            description: "Unique identifier within the source system (e.g. NC SOS file number)"
            semantic_role: "identifier"
            format: "STRING"
          - name: "state_code"
            type: "CHAR"
            nullable: false
            description: "US state code (2 chars, uppercase), constrained to ^[A-Z]{2}$"
            semantic_role: "attribute"
            format: "STRING"
          - name: "raw_payload"
            type: "JSONB"
            nullable: false
            description: "Complete raw data from source as JSONB, preserved for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "ingestion_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the ingestion batch/run, used for tracking and rollback"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when candidate was ingested, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "verification_status"
            type: "TEXT"
            nullable: false
            description: "Status: PENDING, VERIFIED, or FAILED — only VERIFIED can promote to identity"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "verification_error"
            type: "TEXT"
            nullable: true
            description: "If FAILED, contains the error message or code from verification"
            semantic_role: "attribute"
            format: "STRING"
          - name: "verified_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when verification completed (if VERIFIED or FAILED)"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL until candidate is verified and promoted"
            semantic_role: "foreign_key"
            format: "UUID"

      - schema: "cl"
        name: "cl_errors"
        description: "Unified error logging for all CL validation passes with retry and TTL support"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Unique error identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL for pre-mint errors"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lifecycle_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the lifecycle processing run that produced this error"
            semantic_role: "attribute"
            format: "STRING"
          - name: "pass_name"
            type: "TEXT"
            nullable: false
            description: "Validation pass category: existence, name, domain, collision, firmographic"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "failure_reason_code"
            type: "TEXT"
            nullable: false
            description: "Standardized failure reason code (e.g. EXISTENCE_FAIL, NAME_FAIL)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "inputs_snapshot"
            type: "JSONB"
            nullable: true
            description: "Complete snapshot of inputs at time of failure for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Timestamp when error was logged, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when error was resolved, NULL if unresolved"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "retry_count"
            type: "INTEGER"
            nullable: true
            description: "Number of retry attempts made, default 0"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "retry_ceiling"
            type: "INTEGER"
            nullable: true
            description: "Maximum retries before marking permanent, default 3"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "retry_after"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Earliest time to retry this error"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "tool_used"
            type: "TEXT"
            nullable: true
            description: "Tool that resolved or attempted resolution (e.g. MXLookup, Firecrawl)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "tool_tier"
            type: "INTEGER"
            nullable: true
            description: "Toolbox tier: 0=free, 1=cheap, 2=surgical"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "expires_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "TTL for transient errors, auto-resolve after this timestamp"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "cl"
        name: "company_identity_bridge"
        description: "Join surface mapping source system records to sovereign company identities"
        leaf_type: "STAGING"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "bridge_id"
            type: "UUID"
            nullable: false
            description: "Unique bridge record identifier, auto-generated primary key"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_sov_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity sovereign ID, unique per bridge record"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "source_company_id"
            type: "UUID"
            nullable: false
            description: "Unique identifier of the company in the source system"
            semantic_role: "identifier"
            format: "UUID"
          - name: "source_system"
            type: "TEXT"
            nullable: false
            description: "Origin system providing this bridge mapping (e.g. nc_sos, de_csv)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "match_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Confidence score (0-100) for the bridge match quality"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "match_method"
            type: "TEXT"
            nullable: true
            description: "Method used to establish the bridge match (e.g. exact, fuzzy, manual)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "match_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting the bridge match decision"
            semantic_role: "attribute"
            format: "JSON"
          - name: "bridge_status"
            type: "TEXT"
            nullable: true
            description: "Status of the bridge record: active, inactive, superseded"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge record was last updated, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "created_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who created this bridge record"
            semantic_role: "attribute"
            format: "STRING"
          - name: "validated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when bridge was validated by human or automated check"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "validated_by"
            type: "TEXT"
            nullable: true
            description: "Identity of the agent or user who validated this bridge record"
            semantic_role: "attribute"
            format: "STRING"

  # ─────────────────────────────────────────────────────────────────────────────
  # CL ENRICHMENT (04.01.02)
  # ─────────────────────────────────────────────────────────────────────────────
  - subhub_id: "04.01.02"
    name: "enrichment"
    tables:

      - schema: "cl"
        name: "identity_confidence"
        description: "Confidence scoring envelope for identity attributes across verification dimensions"
        leaf_type: "CANONICAL"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "company_unique_id"
            type: "UUID"
            nullable: false
            description: "FK to cl.company_identity, primary key (1:1 relationship with spine)"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "name_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Name matching confidence score from 0 to 100"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "domain_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Domain verification confidence score from 0 to 100"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "linkedin_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "LinkedIn profile match confidence score from 0 to 100"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "state_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "State registration confidence score from 0 to 100"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "overall_confidence_score"
            type: "INTEGER"
            nullable: true
            description: "Composite overall confidence score from 0 to 100"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "confidence_level"
            type: "TEXT"
            nullable: true
            description: "Derived confidence level: HIGH, MEDIUM, or LOW"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "name_verification_status"
            type: "TEXT"
            nullable: true
            description: "Name dimension verification status: verified, pending, or failed"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "domain_verification_status"
            type: "TEXT"
            nullable: true
            description: "Domain dimension verification status: verified, pending, or failed"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "linkedin_verification_status"
            type: "TEXT"
            nullable: true
            description: "LinkedIn dimension verification status: verified, pending, or failed"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "state_verification_status"
            type: "TEXT"
            nullable: true
            description: "State dimension verification status: verified, pending, or failed"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "name_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting name confidence score as JSON"
            semantic_role: "attribute"
            format: "JSON"
          - name: "domain_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting domain confidence score as JSON"
            semantic_role: "attribute"
            format: "JSON"
          - name: "linkedin_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting LinkedIn confidence score as JSON"
            semantic_role: "attribute"
            format: "JSON"
          - name: "state_evidence"
            type: "JSONB"
            nullable: true
            description: "Evidence payload supporting state confidence score as JSON"
            semantic_role: "attribute"
            format: "JSON"
          - name: "last_calculated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when confidence scores were last calculated"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "calculation_method"
            type: "TEXT"
            nullable: true
            description: "Method used for confidence calculation (e.g. weighted_average, rules_v2)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when confidence record was created, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "updated_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when confidence record was last updated, auto-set"
            semantic_role: "attribute"
            format: "ISO-8601"

      - schema: "cl"
        name: "cl_errors_archive"
        description: "Archived errors preserving forensic history without cluttering active error table"
        leaf_type: "ERROR"
        source_of_truth: true
        row_identity_strategy: "UUID"
        columns:
          - name: "error_id"
            type: "UUID"
            nullable: false
            description: "Unique error identifier copied from cl_errors"
            semantic_role: "identifier"
            format: "UUID"
          - name: "company_unique_id"
            type: "UUID"
            nullable: true
            description: "FK to cl.company_identity, NULL for pre-mint errors"
            semantic_role: "foreign_key"
            format: "UUID"
          - name: "lifecycle_run_id"
            type: "TEXT"
            nullable: false
            description: "Identifier for the lifecycle processing run that produced this error"
            semantic_role: "attribute"
            format: "STRING"
          - name: "pass_name"
            type: "TEXT"
            nullable: false
            description: "Validation pass category: existence, name, domain, collision, firmographic"
            semantic_role: "attribute"
            format: "ENUM"
          - name: "failure_reason_code"
            type: "TEXT"
            nullable: false
            description: "Standardized failure reason code (e.g. EXISTENCE_FAIL, NAME_FAIL)"
            semantic_role: "attribute"
            format: "STRING"
          - name: "inputs_snapshot"
            type: "JSONB"
            nullable: true
            description: "Complete snapshot of inputs at time of failure for audit and reprocessing"
            semantic_role: "attribute"
            format: "JSON"
          - name: "created_at"
            type: "TIMESTAMPTZ"
            nullable: false
            description: "Original timestamp when error was logged"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "resolved_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Timestamp when error was resolved"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "retry_count"
            type: "INTEGER"
            nullable: true
            description: "Number of retry attempts made before archival"
            semantic_role: "metric"
            format: "INTEGER"
          - name: "retry_ceiling"
            type: "INTEGER"
            nullable: true
            description: "Maximum retries before marking permanent"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "retry_after"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "Earliest time to retry this error"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "tool_used"
            type: "TEXT"
            nullable: true
            description: "Tool that resolved or attempted resolution"
            semantic_role: "attribute"
            format: "STRING"
          - name: "tool_tier"
            type: "INTEGER"
            nullable: true
            description: "Toolbox tier: 0=free, 1=cheap, 2=surgical"
            semantic_role: "attribute"
            format: "INTEGER"
          - name: "expires_at"
            type: "TIMESTAMPTZ"
            nullable: true
            description: "TTL for transient errors"
            semantic_role: "attribute"
            format: "ISO-8601"
          - name: "archived_at"
            type: "TIMESTAMPTZ"
